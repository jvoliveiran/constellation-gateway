services:
  gateway:
    build:
      context: .
      dockerfile: dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  subgraph:
    # Optional — for local development only. The gateway no longer depends on this at boot.
    # TODO: Replace with your actual subgraph image (e.g. my-org/constellation-subgraph:latest).
    image: ${SUBGRAPH_IMAGE:-node:20-alpine}
    command: ["echo", "Replace SUBGRAPH_IMAGE with your subgraph service"]
    ports:
      - "3001:3001"
